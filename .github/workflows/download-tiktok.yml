name: Process TikTok

on:
  workflow_dispatch:
    inputs:
      tiktok_url:
        description: 'TikTok URL'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    outputs:
      thumbnail: ${{ steps.process.outputs.thumbnail }}
      metadata: ${{ steps.process.outputs.metadata }}
      formats: ${{ steps.process.outputs.formats }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process TikTok
        id: process
        run: |
          node -e "
            const tiktokUrl = '${{ github.event.inputs.tiktok_url }}';
            console.log('Processing:', tiktokUrl);
            const result = {
              metadata: {
                thumbnail: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=500&h=500&fit=crop',
                description: 'Sample TikTok video',
                author: { username: '@creator', nickname: 'Creator' }
              },
              formats: [
                { id: 'no-watermark', label: 'No Watermark', url: 'https://example.com/no-watermark.mp4' },
                { id: 'with-watermark', label: 'With Watermark', url: 'https://example.com/with-watermark.mp4' }
              ]
            };
            console.log('::set-output name=thumbnail::' + result.metadata.thumbnail);
            console.log('::set-output name=metadata::' + JSON.stringify(result.metadata));
            console.log('::set-output name=formats::' + JSON.stringify(result.formats));
          "
